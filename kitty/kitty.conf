# Kitty Config - Catppuccin Macchiato with Liquid Glass Effect

# background
background_image none
dynamic_background_opacity no

# font
font_size 20.0
font_family      Fira Code
bold_font        Fira Code Bold
italic_font      Fira Code Italic
bold_italic_font Fira Code Bold Italic

# windows
window_margin_width 12 12
window_padding_width 12 12
# inactive_border_color #363A4F
window_border_width 2pt
# active_border_color #C6A0F6
draw_minimal_borders yes
hide_window_titlebars yes
hide_window_decorations yes

single_window_margin_width 12

# tabs
tab_bar_style powerline
tab_powerline_style slanted
# active_tab_foreground #CAD3F5
# active_tab_background #363A4F
# inactive_tab_foreground #6E738D
# inactive_tab_background #24273A
# tab_bar_background #1E2030

# layouts
enabled_layouts *

# MacOS
# macos_titlebar_color background
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_window_resizable yes

# Cursor
cursor_shape block
cursor_beam_thickness 1.5

# Scrollback
scrollback_lines 10000

# Performance
repaint_delay 10
sync_to_monitor yes

# Bell
enable_audio_bell no

# URL highlighting
detect_urls yes

# Mouse
copy_on_select yes

# BEGIN_KITTY_COLORS
# foreground #CAD3F5
# background #24273A
# cursor #F5A97F
# cursor_text_color #24273A
# selection_foreground #24273A
# selection_background #5B5F73
# color0 #24273A
# color1 #ED8796
# color2 #A6DA95
# color3 #F5A97F
# color4 #8AADF4
# color5 #C6A0F6
# color6 #91D7E3
# color7 #CAD3F5
# color8  #494D64
# color9  #ED8796
# color10 #A6DA95
# color11 #F5A97F
# color12 #8AADF4
# color13 #C6A0F6
# color14 #91D7E3
# color15 #CAD3F5
# END_KITTY_COLORS

# Keybindings
map cmd+t new_tab
map cmd+w close_tab
map cmd+shift+right next_tab
map cmd+shift+left previous_tab

map cmd+d spawn --location=hsplit --cwd=current
map cmd+shift+d spawn --location=vsplit --cwd=current

map cmd+h neighbor_window left
map cmd+j neighbor_window down
map cmd+k neighbor_window up
map cmd+l neighbor_window right

map cmd+equal increase_font_size
map cmd+minus decrease_font_size
map cmd+0 restore_font_size


# BEGIN_KITTY_THEME
# Base2Tone Suburb Dark
include current-theme.conf
# END_KITTY_THEME
